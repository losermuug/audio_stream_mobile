<svg xmlns="http://www.w3.org/2000/svg" viewBox="150 140 200 220" width="100%" height="100%">
  <!-- Төв хэсэгт байрлах цэвэрхэн хэмнэлт долгион (Зөвхөн Цагаан) -->
  <g transform="translate(250, 250)">
    
    <!-- Зүүн талын долгион - Төгс цэвэрхэн цагаан шугам -->
    <path d="M -90,-20 C -70,-80 -50,-80 -30,0 C -10,80 10,80 30,-20" 
          fill="none" stroke="#FFFFFF" stroke-width="6.5" stroke-linecap="round" opacity="0.5" />

    <!-- Баруун талын долгион - Үндсэн тод цагаан шугам -->
    <path d="M -30,20 C -10,-60 10,-60 30,0 C 50,60 70,60 90,20" 
          fill="none" stroke="#FFFFFF" stroke-width="6.5" stroke-linecap="round" />

    <!-- Төвийн цэг ба минимал цагираг -->
    <circle cx="0" cy="0" r="10" fill="#FFFFFF" />
    <circle cx="0" cy="0" r="20" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4" />
    
  </g>
</svg>
